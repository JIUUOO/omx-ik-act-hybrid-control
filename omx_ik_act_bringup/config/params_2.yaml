# [Camera hardware control guide]
# Values in this file are passed to usb_cam_node_exe. The node decides how
# each value is applied to the V4L2 device.

camera2:
    ros__parameters:
      video_device: "/dev/v4l/by-id/usb-046d_C922_Pro_Stream_Webcam_FD7C337F-video-index0"
      framerate: 30.0
      io_method: "mmap"
      frame_id: "camera2"
      pixel_format: "yuyv"
      av_device_format: "YUV422P"
      image_width: 640
      image_height: 480
      camera_name: "front"
      camera_info_url: "package://omx_ik_act_bringup/config/camera2_info.yaml"

      brightness: 128
      contrast: 128
      saturation: 128
      sharpness: 128
      gain: 0

      auto_white_balance: true
      white_balance: 4600

      autoexposure: false
      exposure: 300

      autofocus: false
      focus: 0
